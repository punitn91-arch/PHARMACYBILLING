{% extends "base.html" %}
{% block body %}
<h3>📜 Audit Logs</h3>
<table class="table table-bordered">
<tr>
<th>User</th><th>Action</th><th>Date</th>
</tr>
{% for l in logs %}
<tr>
<td>{{ l.user }}</td>
<td>{{ l.action }}</td>
<td>{{ l.created_at.strftime('%d-%m-%Y %H:%M') }}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
