{% extends "base.html" %}
{% block title %}Add Medicine{% endblock %}

{% block body %}

<style>
.form-card {
    background: white;
    max-width: 500px;
    padding: 20px;
    border-radius: 6px;
    box-shadow: 0 0 6px #cfd8e3;
}
.field-label {
    display: block;
    margin-bottom: 6px;
    color: #2f3f56;
    font-size: 14px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
button {
    background: #0d6efd;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
}
</style>

<div class="form-card">
    <h2>➕ Add Medicine</h2>

    <form method="POST">
        <label class="field-label" for="medicineName">Medicine Name</label>
        <input type="text" id="medicineName" name="name" placeholder="Medicine Name" required>

        <label class="field-label" for="medicineBatch">Batch</label>
        <input type="text" id="medicineBatch" name="batch" placeholder="Batch" required>

        <label class="field-label" for="medicineBarcode">Barcode</label>
        <input type="text" id="medicineBarcode" name="barcode" placeholder="Barcode / scanner code">

        <label class="field-label" for="medicineExpiry">Expiry Date</label>
        <input type="date" id="medicineExpiry" name="expiry" required>

        <label class="field-label" for="packType">Pack Type</label>
        <select name="pack_type" id="packType">
            <option value="">Select Pack Type</option>
            <option>Strip</option>
            <option>Box</option>
            <option>Bottle</option>
            <option>Sachet</option>
            <option>Tube</option>
            <option>Vial</option>
            <option>Unit</option>
        </select>

        <label class="field-label" id="packQtyLabel" for="packQty">Units per Pack</label>
        <input type="number" id="packQty" name="pack_qty" min="1" step="1" placeholder="e.g. 10">

        <label class="field-label" for="medicineMrp">MRP</label>
        <input type="number" id="medicineMrp" name="mrp" placeholder="MRP" required>

        <label class="field-label" for="discountPercent">Discount (%)</label>
<input type="number" name="discount_percent"
       id="discountPercent"
       min="0" max="100" value="{{ medicine.discount_percent if medicine else 0 }}"
       required>

        <label class="field-label" for="reorderLevel">Reorder Level</label>
        <input type="number" id="reorderLevel" name="reorder_level" min="0" step="1" value="10" placeholder="Low stock alert level">

        <label class="field-label" for="stockQty">Stock Qty</label>
        <input type="number" id="stockQty" name="qty" placeholder="Stock Qty" required>

        <button type="submit">Save Medicine</button>
    </form>
</div>

<script>
function updatePackQtyLabel() {
    let select = document.getElementById("packType");
    let label = document.getElementById("packQtyLabel");
    if (!select || !label) return;
    if ((select.value || "").toLowerCase() === "strip") {
        label.textContent = "Tablets per Strip";
    } else {
        label.textContent = "Units per Pack";
    }
}

document.addEventListener("change", function (e) {
    if (e.target && e.target.id === "packType") {
        updatePackQtyLabel();
    }
});

window.addEventListener("load", updatePackQtyLabel);
</script>

{% endblock %}
