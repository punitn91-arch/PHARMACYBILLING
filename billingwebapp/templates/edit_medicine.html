{% extends "base.html" %}
{% block title %}Edit Medicine{% endblock %}

{% block body %}

<style>
.card {
    background: white;
    max-width: 500px;
    padding: 20px;
    border-radius: 6px;
    box-shadow: 0 0 6px #cfd8e3;
}
.field-label {
    display: block;
    margin-bottom: 6px;
    color: #2f3f56;
    font-size: 14px;
    font-weight: 600;
}
input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
button {
    background: #0d6efd;
    color: white;
    padding: 10px;
    width: 100%;
    border: none;
}
</style>

<div class="card">
    <h2>✏️ Edit Medicine</h2>

    <form method="POST">
        <label class="field-label" for="medicineName">Medicine Name</label>
        <input type="text" id="medicineName" name="name" value="{{ med.name }}" required>

        <label class="field-label" for="medicineBatch">Batch</label>
        <input type="text" id="medicineBatch" name="batch" value="{{ med.batch }}" required>

        <label class="field-label" for="medicineBarcode">Barcode</label>
        <input type="text" id="medicineBarcode" name="barcode" value="{{ med.barcode or '' }}">

        <label class="field-label" for="medicineExpiry">Expiry Date</label>
        <input type="date" id="medicineExpiry" name="expiry" value="{{ med.expiry }}" required>

        <label class="field-label" for="packType">Pack Type</label>
        <select name="pack_type" id="packType">
            <option value="" {% if not med.pack_type %}selected{% endif %}>Select Pack Type</option>
            <option {% if med.pack_type == 'Strip' %}selected{% endif %}>Strip</option>
            <option {% if med.pack_type == 'Box' %}selected{% endif %}>Box</option>
            <option {% if med.pack_type == 'Bottle' %}selected{% endif %}>Bottle</option>
            <option {% if med.pack_type == 'Sachet' %}selected{% endif %}>Sachet</option>
            <option {% if med.pack_type == 'Tube' %}selected{% endif %}>Tube</option>
            <option {% if med.pack_type == 'Vial' %}selected{% endif %}>Vial</option>
            <option {% if med.pack_type == 'Unit' %}selected{% endif %}>Unit</option>
        </select>

        <label class="field-label" id="packQtyLabel" for="packQty">Units per Pack</label>
        <input type="number" id="packQty" name="pack_qty" min="1" step="1" value="{{ med.pack_qty or '' }}">

        <label class="field-label" for="medicineMrp">MRP</label>
        <input type="number" id="medicineMrp" name="mrp" value="{{ med.mrp }}" required>

       <label class="field-label" for="discountPercent">Discount (%)</label>
<input type="number"
       id="discountPercent"
       name="discount_percent"
       value="{{ med.discount_percent }}"
       min="0"
       max="100">

        <label class="field-label" for="reorderLevel">Reorder Level</label>
        <input type="number" id="reorderLevel" name="reorder_level" min="0" step="1" value="{{ med.reorder_level if med.reorder_level is not none else 10 }}">

        <label class="field-label" for="stockQty">Stock Qty</label>
        <input type="number" id="stockQty" name="qty" value="{{ med.qty }}" required>
        

        <button type="submit">Update Medicine</button>
    </form>
</div>

<script>
function updatePackQtyLabel() {
    let select = document.getElementById("packType");
    let label = document.getElementById("packQtyLabel");
    if (!select || !label) return;
    if ((select.value || "").toLowerCase() === "strip") {
        label.textContent = "Tablets per Strip";
    } else {
        label.textContent = "Units per Pack";
    }
}

document.addEventListener("change", function (e) {
    if (e.target && e.target.id === "packType") {
        updatePackQtyLabel();
    }
});

window.addEventListener("load", updatePackQtyLabel);
</script>

{% endblock %}
