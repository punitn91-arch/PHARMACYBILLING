{% extends "base.html" %}
{% block title %}Add Medicine{% endblock %}

{% block body %}

<style>
.form-card {
    background: white;
    max-width: 500px;
    padding: 20px;
    border-radius: 6px;
    box-shadow: 0 0 6px #cfd8e3;
}

input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
button {
    background: #0d6efd;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
}
</style>

<div class="form-card">
    <h2>➕ Add Medicine</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Medicine Name" required>
        <input type="text" name="batch" placeholder="Batch" required>
        <input type="date" name="expiry" required>
        <select name="pack_type" id="packType">
            <option value="">Select Pack Type</option>
            <option>Strip</option>
            <option>Box</option>
            <option>Bottle</option>
            <option>Sachet</option>
            <option>Tube</option>
            <option>Vial</option>
            <option>Unit</option>
        </select>
        <label id="packQtyLabel">Units per Pack</label>
        <input type="number" name="pack_qty" min="1" step="1" placeholder="e.g. 10">
        <input type="number" name="mrp" placeholder="MRP" required>
        <label>Discount (%)</label>
<input type="number" name="discount_percent"
       min="0" max="100" value="{{ medicine.discount_percent if medicine else 0 }}"
       required>

        <input type="number" name="qty" placeholder="Stock Qty" required>

        <button type="submit">Save Medicine</button>
    </form>
</div>

<script>
function updatePackQtyLabel() {
    let select = document.getElementById("packType");
    let label = document.getElementById("packQtyLabel");
    if (!select || !label) return;
    if ((select.value || "").toLowerCase() === "strip") {
        label.textContent = "Tablets per Strip";
    } else {
        label.textContent = "Units per Pack";
    }
}

document.addEventListener("change", function (e) {
    if (e.target && e.target.id === "packType") {
        updatePackQtyLabel();
    }
});

window.addEventListener("load", updatePackQtyLabel);
</script>

{% endblock %}
